name: Trigger Flight Monitor Hourly

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes as fallback

jobs:
  check-time-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Check if it's time to run flight monitor
        id: check_time
        run: |
          MINUTE=$(date +%M)
          if [ "$MINUTE" = "23" ] || [ "$MINUTE" = "24" ] || [ "$MINUTE" = "25" ]; then
            echo "trigger=true" >> $GITHUB_OUTPUT
          else
            echo "trigger=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger flight monitor workflow
        if: steps.check_time.outputs.trigger == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'flight-monitor.yml',
              ref: 'main'
            })
