name: Flight Monitor - PAS to ATH

on:
  schedule:
    - cron: '0 * * * *'   # Every hour
  workflow_dispatch:        # Allow manual runs from GitHub UI

jobs:
  check-flight:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit state file back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Note - Using Haiku for cost efficiency
        run: echo "This workflow uses Haiku model to minimize token usage"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run flight monitor
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python flight_monitor.py

      - name: Send manual run notification
        if: github.event_name == 'workflow_dispatch'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 -c '
          import smtplib
          import os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from datetime import datetime

          run_id = os.environ.get("RUN_ID", "unknown")
          msg = MIMEMultipart()
          msg["From"] = "jtseng1999@gmail.com"
          msg["To"] = "jtseng1999@gmail.com"
          msg["Subject"] = f"Flight Monitor Manual Run - {datetime.utcnow().isoformat()}"
          body = f"Manual flight monitor run executed at {datetime.utcnow().isoformat()} UTC.\n\nCheck the full run here:\nhttps://github.com/jtseng-1999/flight-monitor/actions/runs/{run_id}\n\n— Flight Monitor"
          msg.attach(MIMEText(body, "plain"))

          try:
              password = os.environ.get("GMAIL_APP_PASSWORD", "").replace(" ", "")
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
                  server.login("jtseng1999@gmail.com", password)
                  server.send_message(msg)
              print("Manual run notification sent!")
          except Exception as e:
              print(f"Failed to send notification: {e}")
          '

      - name: Upload screenshot (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flight-check-screenshot
          path: flight_check.png
          retention-days: 3

      - name: Save state back to repo
        run: |
          git config user.email "flight-monitor@github-actions"
          git config user.name "Flight Monitor Bot"
          if [ -f .flight_monitor_state.json ]; then
            git add .flight_monitor_state.json
            git diff --staged --quiet || git commit -m "chore: update flight monitor state [skip ci]"
            git push
          fi

      - name: Send failure alert
        if: failure()
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 -c '
          import smtplib
          import os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from datetime import datetime

          run_id = os.environ.get("RUN_ID", "unknown")
          msg = MIMEMultipart()
          msg["From"] = "jtseng1999@gmail.com"
          msg["To"] = "jtseng1999@gmail.com"
          msg["Subject"] = "Flight Monitor Run FAILED"
          body = f"Flight monitor check failed at {datetime.utcnow().isoformat()} UTC.\n\nThis means you might not get seat availability alerts. Check the logs:\nhttps://github.com/jtseng-1999/flight-monitor/actions/runs/{run_id}\n\nCommon issues:\n- Google Flights blocked the request (bot detection)\n- Network connectivity issue\n- Gmail authentication failed\n\n— Flight Monitor"
          msg.attach(MIMEText(body, "plain"))

          try:
              password = os.environ.get("GMAIL_APP_PASSWORD", "").replace(" ", "")
              with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
                  server.login("jtseng1999@gmail.com", password)
                  server.send_message(msg)
              print("Failure alert sent!")
          except Exception as e:
              print(f"Failed to send alert: {e}")
          '
